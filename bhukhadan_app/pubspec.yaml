name: bhuarjan
description: A new Flutter project.
publish_to: 'none'
version: 1.2.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  shared_preferences: ^2.2.0
  pinput: ^6.0.1
  smart_auth: ^2.0.0
  flutter_pdfview: ^1.3.2
  image_picker: ^1.0.4
  http: ^1.1.0
  google_fonts: ^8.0.0
  provider: ^6.0.5
  intl: ^0.20.2
  url_launcher: ^6.3.2
  geolocator: ^13.0.1
  webview_flutter: ^4.4.2
  geocoding: ^4.0.0
  image: ^4.7.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
     - assets/images/
     - assets/icons/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/logo.png"
  windows:
    generate: true
    image_path: "assets/images/logo.png"
    icon_size: 256
